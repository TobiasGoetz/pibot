name: "Helm Publish"

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs: {}

jobs:
  publish:
    runs-on: rpi-cluster
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get app version
        id: version
        run: |
          v=$(grep '^version =' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$v" >> $GITHUB_OUTPUT

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: "v3.14.0"

      - name: Package chart
        run: |
          helm package charts/pibot \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Push chart to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push pibot-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${OWNER}/helm-charts
