name: Code quality

on:
  pull_request:
    branches:
      - main
      - develop
      - "releases/**"
    tags:
      - v*

permissions:
  contents: read

jobs:
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Run Ruff
        run: uvx ruff check --output-format=github

  ty:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Run ty check
        run: uvx ty check --output-format=github
