name: Code quality

on:
  pull_request:
    branches:
      - main
      - develop
      - 'releases/**'
    tags:
      - v*

permissions:
  contents: read

jobs:
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: "./src"
          args: "check --output-format=github"

  ty:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "--version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Run ty check
        run: uv run ty check
