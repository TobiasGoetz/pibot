name: Code quality

on:
  pull_request:
    branches:
      - main
      - develop
      - "releases/**"
    tags:
      - v*

permissions:
  contents: read

env:
  UV_LINK_MODE: copy
  UV_CACHE_DIR: .uv-cache

jobs:
  ruff:
    name: Lint (Ruff)
    runs-on: rpi-cluster
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked
      - name: Run Ruff
        run: uv run ruff check --output-format=github

  ty:
    name: Type check (ty)
    runs-on: rpi-cluster
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked
      - name: Run ty check
        run: uv run ty check --output-format=github
