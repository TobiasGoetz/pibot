name: "Docker Publish"

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs: {}
    secrets:
      DOCKERHUB_TOKEN:
        description: "Docker Hub token for authentication"
        required: true

jobs:
  build-and-publish:
    runs-on: rpi-cluster
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set version
        id: version
        run: echo "version=$(grep '^version =' pyproject.toml | sed 's/version = "\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Set GHCR repository (lowercase)
        id: ghcr
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            "${{ vars.DOCKERHUB_REPOSITORY }}:latest"
            "${{ vars.DOCKERHUB_REPOSITORY }}:${{ steps.version.outputs.version }}"
            ghcr.io/${{ steps.ghcr.outputs.repo }}:latest
            ghcr.io/${{ steps.ghcr.outputs.repo }}:${{ steps.version.outputs.version }}